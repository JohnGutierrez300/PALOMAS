<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>John & Celeste: El Reencuentro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      background: #050510;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Press Start 2P', cursive;
      overflow: hidden;
      touch-action: manipulation;
    }

    #game-container {
      position: relative;
      border: 4px solid #1e90ff;
      box-shadow: 0 0 25px rgba(30, 144, 255, 0.4);
    }

    canvas {
      display: block;
      background: linear-gradient(to bottom, #020814, #0a1a33);
      max-width: 100vw;
      height: auto;
    }

    .ui-layer {
      position: absolute;
      top: 15px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 25px;
      box-sizing: border-box;
      color: #fff;
      font-size: 10px;
      pointer-events: none;
      text-shadow: 2px 2px #000;
    }

    .screen {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 10;
    }

    #game-over {
      background: rgba(20, 0, 0, 0.9);
      color: #ff3333;
    }

    #win-screen {
      background: rgba(0, 20, 10, 0.9);
      color: #00ffcc;
    }

    button {
      margin-top: 25px;
      background: #1e90ff;
      border: 3px solid #fff;
      color: white;
      padding: 12px 24px;
      font-family: 'Press Start 2P';
      cursor: pointer;
      font-size: 10px;
    }

    button:hover {
      background: #00ccff;
    }

    /* ESTILOS DE LOS BOTONES MÓVILES */
    .mobile-controls {
      display: flex;
      width: 100%;
      max-width: 800px;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .d-pad {
      display: flex;
      gap: 15px;
    }

    .m-btn {
      width: 65px;
      height: 65px;
      background: #1e90ff;
      border: 4px solid #fff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      user-select: none;
      touch-action: none;
      box-shadow: 0 5px #0055aa;
    }

    .m-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px #0055aa;
      background: #00ccff;
    }

    .jump-btn {
      width: 100px;
      background: #ff0080;
      box-shadow: 0 5px #aa0055;
    }

    .jump-btn:active {
      box-shadow: 0 1px #aa0055;
      background: #ff4fa3;
    }
  </style>
</head>

<body>

  <div id="game-container">
    <div class="ui-layer">
      <div id="lives-display">VIDAS: ♥ ♥ ♥</div>
      <div id="dist-display">¡CUIDADO CON LAS PALOMAS!</div>
    </div>
    <canvas id="c" width="800" height="400"></canvas>

    <div id="game-over" class="screen">
      <h1 style="font-size: 24px;">GAME OVER</h1>
      <p style="font-size: 9px; line-height: 2; color: #aaa;">John no pudo encontrarla...<br>Los obstáculos fueron
        demasiado.</p>
      <button onclick="resetGame()">REINTENTAR</button>
    </div>

    <div id="win-screen" class="screen">
      <h1 style="font-size: 24px;">¡LO LOGRASTE!</h1>
      <p style="font-size: 9px; line-height: 2; color: #eee;">John finalmente encontró a Celeste.<br>Ya nada los
        separará.</p>
      <button onclick="resetGame()">JUGAR DE NUEVO</button>
    </div>
  </div>

  <div class="mobile-controls">
    <div class="d-pad">
      <div class="m-btn" id="leftBtn">◀</div>
      <div class="m-btn" id="rightBtn">▶</div>
    </div>
    <div class="m-btn jump-btn" id="jumpBtn">SALTAR</div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const gameOverScreen = document.getElementById('game-over');
    const winScreen = document.getElementById('win-screen');

    let lives = 3;
    let gravity = 0.65;
    let friction = 0.88;
    let isRunning = true;
    let cameraX = 0;

    const john = {
      x: 50, y: 200, vx: 0, vy: 0,
      w: 24, h: 40, onGround: false, facing: 1
    };

    const celeste = {
      x: 3500, y: 240,
      w: 24, h: 42,
      color: "#ff4fa3"
    };

    const platforms = [
      { x: 0, y: 320, w: 300, h: 80 },
      { x: 400, y: 260, w: 150, h: 25 },
      { x: 700, y: 200, w: 150, h: 25 },
      { x: 950, y: 280, w: 200, h: 25 },
      { x: 1250, y: 220, w: 150, h: 25 },
      { x: 1500, y: 160, w: 120, h: 25 },
      { x: 1750, y: 260, w: 200, h: 25 },
      { x: 2100, y: 280, w: 150, h: 25 },
      { x: 2400, y: 200, w: 200, h: 25 },
      { x: 2750, y: 260, w: 150, h: 25 },
      { x: 3000, y: 180, w: 150, h: 25 },
      { x: 3300, y: 300, w: 400, h: 100 }
    ];

    const spikes = [
      { x: 120, y: 310, w: 60 },
      { x: 1000, y: 270, w: 80 },
      { x: 2450, y: 190, w: 60 },
      { x: 3400, y: 290, w: 100 }
    ];

    const pigeons = [
      { x: 500, y: 120, startX: 500, range: 150 },
      { x: 1300, y: 80, startX: 1300, range: 200 },
      { x: 1900, y: 150, startX: 1900, range: 100 },
      { x: 2800, y: 100, startX: 2800, range: 250 }
    ];

    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    // Lógica para botones móviles
    const setupMobileBtn = (id, keyCode) => {
      const btn = document.getElementById(id);
      const press = (e) => { e.preventDefault(); keys[keyCode] = true; };
      const release = (e) => { e.preventDefault(); keys[keyCode] = false; };

      btn.addEventListener('touchstart', press);
      btn.addEventListener('touchend', release);
      btn.addEventListener('mousedown', press);
      btn.addEventListener('mouseup', release);
    };

    setupMobileBtn('leftBtn', 'ArrowLeft');
    setupMobileBtn('rightBtn', 'ArrowRight');
    setupMobileBtn('jumpBtn', 'Space');

    function update() {
      if (!isRunning) return;

      if (keys['ArrowRight']) { john.vx += 1.1; john.facing = 1; }
      if (keys['ArrowLeft']) { john.vx -= 1.1; john.facing = -1; }
      if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && john.onGround) {
        john.vy = -14;
        john.onGround = false;
      }

      john.vy += gravity;
      john.vx *= friction;
      john.x += john.vx;
      john.y += john.vy;

      john.onGround = false;
      platforms.forEach(p => {
        if (john.x + john.w > p.x && john.x < p.x + p.w &&
          john.y + john.h > p.y && john.y + john.h < p.y + p.h + john.vy) {
          john.onGround = true;
          john.vy = 0;
          john.y = p.y - john.h;
        }
      });

      spikes.forEach(s => {
        if (john.x + john.w > s.x && john.x < s.x + s.w && john.y + john.h > s.y && john.y < s.y + 15) {
          respawn();
        }
      });

      pigeons.forEach(p => {
        p.x = p.startX + Math.sin(Date.now() * 0.002) * p.range;
        if (john.x + john.w > p.x && john.x < p.x + 30 && john.y + john.h > p.y && john.y < p.y + 20) {
          respawn();
        }
      });

      let dist = Math.sqrt(Math.pow(john.x - celeste.x, 2) + Math.pow(john.y - celeste.y, 2));
      if (dist < 40) victory();

      if (john.y > canvas.height) respawn();

      let targetCam = john.x - canvas.width / 3;
      cameraX += (targetCam - cameraX) * 0.1;
      if (cameraX < 0) cameraX = 0;

      draw();
      requestAnimationFrame(update);
    }

    function respawn() {
      lives--;
      document.getElementById('lives-display').innerText = 'VIDAS: ' + '♥ '.repeat(Math.max(0, lives));
      if (lives <= 0) {
        isRunning = false;
        gameOverScreen.style.display = 'flex';
      } else {
        john.x -= 150;
        if (john.x < 50) john.x = 50;
        john.y = 100; john.vx = 0; john.vy = 0;
      }
    }

    function victory() {
      isRunning = false;
      winScreen.style.display = 'flex';
    }

    function resetGame() {
      location.reload();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(-cameraX, 0);

      ctx.fillStyle = '#1e90ff';
      ctx.globalAlpha = 0.5;
      let wave = Math.sin(Date.now() * 0.003) * 5;
      ctx.fillRect(cameraX, 365 + wave, canvas.width + 100, 40);
      ctx.globalAlpha = 1;

      platforms.forEach(p => {
        ctx.fillStyle = '#0044cc';
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#00ffff';
        ctx.fillRect(p.x, p.y, p.w, 4);
      });

      ctx.fillStyle = '#ff0000';
      spikes.forEach(s => {
        for (let i = 0; i < s.w; i += 20) {
          ctx.beginPath();
          ctx.moveTo(s.x + i, s.y + 10);
          ctx.lineTo(s.x + i + 10, s.y - 10);
          ctx.lineTo(s.x + i + 20, s.y + 10);
          ctx.fill();
        }
      });

      ctx.fillStyle = '#888888';
      pigeons.forEach(p => {
        ctx.fillRect(p.x, p.y, 30, 15);
        ctx.fillStyle = '#ffffff';
        let wing = Math.sin(Date.now() * 0.2) > 0 ? -10 : 5;
        ctx.fillRect(p.x + 5, p.y + wing, 20, 5);
        ctx.fillStyle = '#888888';
      });

      ctx.fillStyle = celeste.color;
      ctx.shadowBlur = 15;
      ctx.shadowColor = "#ff0080";
      ctx.fillRect(celeste.x, celeste.y + Math.sin(Date.now() * 0.005) * 5, celeste.w, celeste.h);
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#fff";
      ctx.font = "8px 'Press Start 2P'";
      ctx.fillText("CELESTE", celeste.x - 10, celeste.y - 20);

      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(john.x, john.y, john.w, john.h);
      ctx.fillStyle = '#000';
      let eyeX = john.facing === 1 ? john.x + 15 : john.x + 4;
      ctx.fillRect(eyeX, john.y + 10, 5, 5);

      ctx.restore();
    }

    update();
  </script>
</body>

</html>
